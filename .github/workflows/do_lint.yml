name: Lint

on: workflow_call

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # allows golangci-lint-action to annotate PR diffs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
          cache: false # golangci-lint-action manages its own cache

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.10.1
